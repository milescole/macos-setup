add_newline = false
command_timeout = 1000

format = """
$directory$git_branch$git_status$fill$cmd_duration
$character
"""

right_format = "$nodejs$python$golang$rust$docker_context$kubernetes"

[character]
error_symbol = "[>](bold red)"
success_symbol = "[>](bold green)"
vimcmd_symbol = "[>](bold yellow)"

[cmd_duration]
format = "[${duration}](dimmed white)"
min_time = 500

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false

[docker_context]
symbol = " "

[git_branch]
style = "bold purple"
symbol = " "

[git_status]
ahead = " [⇡${count}](bold yellow)"
behind = " [⇣${count}](bold yellow)"
conflicted = " [=${count}](bold red)"
deleted = " [x${count}](bold red)"
diverged = " [⇕⇡${ahead_count}⇣${behind_count}](bold yellow)"
format = "[$all_status$ahead_behind]($style)"
modified = " [!${count}](bold yellow)"
renamed = " [»${count}](bold blue)"
staged = " [+${count}](bold green)"
stashed = " [*${count}](bold cyan)"
style = "bold white"
untracked = " [?${count}](bold red)"

[golang]
symbol = " "

[kubernetes]
disabled = false
symbol = " "

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "
