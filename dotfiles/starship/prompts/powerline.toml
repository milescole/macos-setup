[Ôûê](fg:red bg:red)\
$os\
$username\
[¯é░](fg:red bg:peach)\
$directory\
[¯é░](fg:peach bg:yellow)\
$git_branch\
$git_state\
$git_status\
[¯é░ ](fg:yellow)\
$line_break\
$character\
"""

# Right prompt: active runtimes and environments.
right_format = """
[¯é▓](fg:green)\
$c$rust$golang$nodejs$php$java$kotlin$haskell$python\
[¯é▓](fg:sapphire bg:green)\
$cmd_duration\
[¯é▓](fg:lavender bg:sapphire)\
$time\
[Ôûê](fg:lavender bg:lavender)\
"""

