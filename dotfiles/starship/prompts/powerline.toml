[kotlin]
symbol = "¯ÿ┤"
style = "fg:crust bg:green"
format = '[ $symbol( $version) ]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "fg:crust bg:green"
format = '[ $symbol( $version) ]($style)'

[python]
symbol = "¯ÿå"
style = "fg:crust bg:green"
