[docker_context]
symbol = "´îê"
style = "fg:crust bg:sapphire"
format = '[ $symbol( $context) ]($style)'

[time]
disabled = false
time_format = "%T"
style = "fg:crust bg:lavender"
format = '[ $time ´É║]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
