format = '[ $user ]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "ÔÇª/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "¾░êÖ"
"Downloads" = "´ÇÖ"
"Music" = "¾░ØÜ"
"Pictures" = "´Ç¥"
"Developer" = "¾░▓ï"

[git_branch]
symbol = "´Éÿ"
style = "fg:crust bg:yellow"
format = '[ ´Éê $symbol $branch ]($style)'

[git_state]
format = '[ $state( $progress_current/$progress_total) ]($style)'
style = "fg:crust bg:yellow"
rebase = "´æ┐"
merge = "´ÉÖ"
revert = "¾░òî"
cherry_pick = "¯èø"
bisect = "´Éó"
am = "´É»"
am_or_rebase = "´æ┐ or ´É»"

[git_status]
format = '[ $all_status$ahead_behind]($style)'
style = "fg:crust bg:yellow"
ahead = 'Ôçí${count} '
behind = 'Ôçú${count} '
conflicted = '~${count} '
deleted = 'Ô£ÿ${count} '
diverged = 'Ôçú${behind_count} Ôçí${ahead_count} '
modified = '!${count} '
renamed = '┬╗${count} '
staged = '+${count} '
stashed = '*${count} '
untracked = '?${count} '
up_to_date = ''

[nodejs]
symbol = "¯£ÿ"
style = "fg:crust bg:green"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = "¯ÿ× "
style = "fg:crust bg:green"
format = '[ $symbol( $version) ]($style)'

[rust]
symbol = "¯×¿"
style = "fg:crust bg:green"
format = '[ $symbol( $version) ]($style)'

[golang]
symbol = "¯ÿº"
style = "fg:crust bg:green"
