"$schema" = 'https://starship.rs/config-schema.json'

palette = 'catppuccin_mocha'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$nodejs\
$golang\
$rust\
$php\
$java\
$kotlin\
$haskell\
$c\
$conda\
$cmd_duration\
$time\
$line_break\
$character\
"""

[fill]
symbol = " "

[username]
show_always = false
format = "[$user@]($style)"
style_user = "bold text"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname ]($style)"
style = "bold text"

[directory]
format = "[$path]($style) "
style = "blue"
truncation_length = 4
truncation_symbol = "../"
truncate_to_repo = false

[git_branch]
symbol = "ïگک "
format = "[$symbol$branch]($style) "
style = "bold yellow"

[git_state]
format = "[($state( $progress_current/$progress_total))]($style) "
style = "overlay1"
rebase = "ï‘؟"
merge = "ïگ™"
revert = "َ°•Œ"
cherry_pick = "îٹ›"
bisect = "ïگ¢"
am = "ïگ¯"
am_or_rebase = "ï‘؟ or ïگ¯"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "red"
ahead = "â‡،${count} "
behind = "â‡£${count} "
conflicted = "~${count} "
deleted = "âœک${count} "
diverged = "â‡£${behind_count} â‡،${ahead_count} "
modified = "!${count} "
renamed = "آ»${count} "
staged = "+${count} "
stashed = "*${count} "
untracked = "?${count} "
up_to_date = ""

[python]
symbol = "îک† "
format = '[${pyenv_prefix}(${version} )(\($virtualenv\) )$symbol]($style) '
style = "green"

[nodejs]
symbol = "îœک "
format = "[$version $symbol]($style) "
style = "green"

[golang]
symbol = "îک§ "
format = "[$version $symbol]($style) "
style = "green"

[rust]
symbol = "î‍¨ "
format = "[$version $symbol]($style) "
style = "green"

[php]
symbol = "îکˆ "
format = "[$version $symbol]($style) "
style = "green"

[java]
symbol = "î‰– "
format = "[$version $symbol]($style) "
style = "green"

[kotlin]
symbol = "îک´ "
format = "[$version $symbol]($style) "
style = "green"

[haskell]
symbol = "îکں "
format = "[$version $symbol]($style) "
style = "green"

[c]
symbol = "îک‍ "
format = "[$version $symbol]($style) "
style = "green"

[conda]
symbol = "ï„Œ "
format = "[$environment $symbol]($style) "
style = "green"
ignore_base = true

[cmd_duration]
show_milliseconds = true
min_time = 0
format = "[$duration ï‰’]($style) "
style = "subtext0"

[time]
disabled = false
time_format = "%H:%M"
format = "[$time َ°¥”]($style)"
style = "subtext0"

[line_break]
disabled = false

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"
vimcmd_replace_one_symbol = "[<](bold yellow)"
vimcmd_replace_symbol = "[<](bold yellow)"
vimcmd_visual_symbol = "[<](bold blue)"

