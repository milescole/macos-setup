"$schema" = 'https://starship.rs/config-schema.json'

palette = 'nord_aurora'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$nodejs\
$golang\
$rust\
$php\
$java\
$kotlin\
$haskell\
$c\
$conda\
$cmd_duration\
$time\
$line_break\
$character\
"""

[fill]
symbol = " "

[username]
show_always = false
format = "[$user@]($style)"
style_user = "bold bright_white"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname ]($style)"
style = "bold bright_white"

[directory]
format = "[$path]($style) "
style = "bold cyan"
truncation_length = 4
truncation_symbol = "../"
truncate_to_repo = false

[git_branch]
symbol = "´Éÿ "
format = "[$symbol$branch]($style) "
style = "bold magenta"

[git_state]
format = "[($state( $progress_current/$progress_total))]($style) "
style = "bold blue"
rebase = "´æ┐"
merge = "´ÉÖ"
revert = "¾░òî"
cherry_pick = "¯èø"
bisect = "´Éó"
am = "´É»"
am_or_rebase = "´æ┐ or ´É»"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bold red"
ahead = "Ôçí${count} "
behind = "Ôçú${count} "
conflicted = "~${count} "
deleted = "Ô£ÿ${count} "
diverged = "Ôçú${behind_count} Ôçí${ahead_count} "
modified = "!${count} "
renamed = "┬╗${count} "
staged = "+${count} "
stashed = "*${count} "
untracked = "?${count} "
up_to_date = ""

[python]
symbol = "¯ÿå "
format = '[${pyenv_prefix}(${version} )(\($virtualenv\) )$symbol]($style) '
style = "bold green"

[nodejs]
symbol = "¯£ÿ "
format = "[$version $symbol]($style) "
style = "bold green"

[golang]
symbol = "¯ÿº "
format = "[$version $symbol]($style) "
style = "bold cyan_alt"

[rust]
symbol = "¯×¿ "
format = "[$version $symbol]($style) "
style = "bold yellow"

[php]
symbol = "¯ÿê "
format = "[$version $symbol]($style) "
style = "bold blue"

[java]
symbol = "¯ëû "
format = "[$version $symbol]($style) "
style = "bold red"

[kotlin]
symbol = "¯ÿ┤ "
format = "[$version $symbol]($style) "
style = "bold blue"

[haskell]
symbol = "¯ÿƒ "
format = "[$version $symbol]($style) "
style = "bold magenta"

[c]
symbol = "¯ÿ× "
format = "[$version $symbol]($style) "
style = "bold cyan"

[conda]
symbol = "´äî "
format = "[$environment $symbol]($style) "
style = "bold green"
ignore_base = true

[cmd_duration]
show_milliseconds = true
min_time = 0
format = "[$duration ´ëÆ]($style) "
style = "bold yellow"

[time]
disabled = false
time_format = "%H:%M"
format = "[$time ¾░Ñö]($style)"
style = "bold white"

[line_break]
disabled = false

[character]
success_symbol = "[´äü](bold green)"
error_symbol = "[´äü](bold red)"
vimcmd_symbol = "[´äÇ](bold cyan)"
vimcmd_replace_one_symbol = "[´äÇ](bold yellow)"
vimcmd_replace_symbol = "[´äÇ](bold yellow)"
vimcmd_visual_symbol = "[´äÇ](bold magenta)"

[palettes.nord_aurora]
bg = "#232731"
fg = "#CFD6E4"
black = "#2D3241"
bright_black = "#3B4457"
red = "#B04B57"
green = "#93B379"
yellow = "#E5C179"
blue = "#6F8FB4"
magenta = "#A4799D"
cyan = "#77B3C5"
cyan_alt = "#7EAFAD"
white = "#DFE3EC"
bright_white = "#E7EBF1"
