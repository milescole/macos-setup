"$schema" = 'https://starship.rs/config-schema.json'

palette = 'tokyonight'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$nodejs\
$golang\
$rust\
$php\
$java\
$kotlin\
$haskell\
$c\
$conda\
$cmd_duration\
$time\
$line_break\
$character\
"""

[fill]
symbol = " "

[username]
show_always = false
format = "[$user@]($style)"
style_user = "bold cyan"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname ]($style)"
style = "bold cyan"

[directory]
format = "[$path]($style) "
style = "blue"
truncation_length = 4
truncation_symbol = "../"
truncate_to_repo = false

[git_branch]
symbol = "´Éÿ "
format = "[$symbol$branch]($style) "
style = "bold cyan"

[git_state]
format = "[($state( $progress_current/$progress_total))]($style) "
style = "fg:white"
rebase = "´æ┐"
merge = "´ÉÖ"
revert = "¾░òî"
cherry_pick = "¯èø"
bisect = "´Éó"
am = "´É»"
am_or_rebase = "´æ┐ or ´É»"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "soft_blue"
ahead = "Ôçí${count} "
behind = "Ôçú${count} "
conflicted = "~${count} "
deleted = "Ô£ÿ${count} "
diverged = "Ôçú${behind_count} Ôçí${ahead_count} "
modified = "!${count} "
renamed = "┬╗${count} "
staged = "+${count} "
stashed = "*${count} "
untracked = "?${count} "
up_to_date = ""

[python]
symbol = "¯ÿå "
format = '[${pyenv_prefix}(${version} )(\($virtualenv\) )$symbol]($style) '
style = "cyan"

[nodejs]
symbol = "¯£ÿ "
format = "[$version $symbol]($style) "
style = "cyan"

[golang]
symbol = "¯ÿº "
format = "[$version $symbol]($style) "
style = "cyan"

[rust]
symbol = "¯×¿ "
format = "[$version $symbol]($style) "
style = "cyan"

[php]
symbol = "¯ÿê "
format = "[$version $symbol]($style) "
style = "cyan"

[java]
symbol = "¯ëû "
format = "[$version $symbol]($style) "
style = "cyan"

[kotlin]
symbol = "¯ÿ┤ "
format = "[$version $symbol]($style) "
style = "cyan"

[haskell]
symbol = "¯ÿƒ "
format = "[$version $symbol]($style) "
style = "cyan"

[c]
symbol = "¯ÿ× "
format = "[$version $symbol]($style) "
style = "cyan"

[conda]
symbol = "´äî "
format = "[$environment $symbol]($style) "
style = "cyan"
ignore_base = true

[cmd_duration]
show_milliseconds = true
min_time = 0
format = "[$duration ´ëÆ]($style) "
style = "fg:white"

[time]
disabled = false
time_format = "%H:%M"
format = "[$time ¾░Ñö]($style)"
style = "fg:white"

[line_break]
disabled = false

[character]
success_symbol = "[>](bold cyan)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold cyan)"
vimcmd_replace_one_symbol = "[<](bold blue)"
vimcmd_replace_symbol = "[<](bold blue)"
vimcmd_visual_symbol = "[<](bold blue)"

[palettes.tokyonight]
foreground = "#c0caf5"
background = "#1a1b26"
black = "#15161e"
blue = "#7aa2f7"
cyan = "#7dcfff"
soft_blue = "#a3aed2"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
white = "#a9b1d6"
yellow = "#e0af68"
bright_black = "#414868"
selection_background = "#33467c"
